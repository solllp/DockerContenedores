services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Merida
      - PASSWORD=TuContraseĂąaSegura
    volumes:
      - ./config:/config
      - ./projects:/config/workspace